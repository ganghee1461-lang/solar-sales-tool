[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/buildings.geojson"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/api/solar"
  to = "/.netlify/functions/solar"
  status = 200

[[redirects]]
  from = "/api/parking"
  to = "/.netlify/functions/parking"
  status = 200
