<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태양광 영업툴</title>
<link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div class="header">
      <h1>☀ 태양광 영업툴</h1>
    </div>

    <!-- 필터 -->
    <div class="section">
      <h3>필터</h3>
      <label>지역</label>
      <select id="sidoFilter">
        <option value="">전체</option>
      </select>

      <label>최소 설비용량 <span id="capValue">100 kW</span></label>
      <input type="range" id="capSlider" min="500" max="5000" value="1000" step="100">

      <label>지붕 활용률 <span id="utilValue">50%</span></label>
      <input type="range" id="utilSlider" min="0" max="100" value="100" step="5">

      <label>㎡당 설비용량 <span id="kwValue">0.10 kW</span></label>
      <input type="range" id="kwSlider" min="5" max="20" value="10" step="1">
    </div>

    <!-- 레이어 -->
    <div class="section">
      <h3>레이어</h3>
      <label class="check"><input type="checkbox" id="layerBuildings" checked> 건물 폴리곤</label>
    </div>

    <!-- 결과 탭 -->
    <div class="section results-section">
      <div class="tabs">
        <button class="tab active" data-tab="building">지붕형 (<span id="bldgCount">0</span>)</button>
        <button class="tab" data-tab="bookmark">★ 북마크 (<span id="bmCount">0</span>)</button>
      </div>

      <div class="sort-bar">
        <button id="sortBtn">설비용량 ↓</button>
        <button id="exportBtn">엑셀 ↓</button>
      </div>

      <div id="resultsList"></div>
    </div>
  </aside>

  <main id="map-container">
    <div class="map-controls">
      <div class="map-type">
        <button class="map-type-btn active" data-type="base">일반</button>
        <button class="map-type-btn" data-type="satellite">위성</button>
      </div>
      <div class="legend">
        <div><span class="dot blue"></span>공장/창고</div>
        <div><span class="dot green"></span>무벽/축사</div>
        <div><span class="dot red"></span>기설치</div>
        <div><span class="dot yellow"></span>주차장</div>
      </div>
    </div>
    <div id="map"></div>
  </main>
</div>

<!-- 로딩 -->
<div id="loading" class="hidden">
  <div class="spinner"></div>
  <div id="loadingText">로딩 중...</div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<!-- 주소 검색 모달 -->
<div id="addressModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>주소 검색</h3>
      <button id="closeAddrModal">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" id="addrSearchInput" placeholder="키워드 입력 (예: 삼성전자 천안)">
      <button id="addrSearchBtn">검색</button>
      <div id="addrResults"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
