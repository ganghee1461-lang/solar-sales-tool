<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태양광 영업 타겟 분석 툴</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #131313;
    --panel-2: #1a1a1a;
    --border: #262626;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #fbbf24;
    --accent-dim: #d97706;
    --blue: #3b82f6;
    --red: #ef4444;
    --green: #10b981;
    --orange: #f97316;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 380px 1fr;
  }

  /* Sidebar */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .brand {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .brand-text { flex: 1; }
  .brand-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
  .brand-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

  .panel-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .filter-grid.full { grid-template-columns: 1fr; }

  .field-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    display: block;
  }

  select, input[type="text"] {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-size: 12px;
    font-family: inherit;
    border-radius: 6px;
    outline: none;
  }

  select:focus, input:focus { border-color: var(--accent); }

  .slider-wrap {
    margin-top: 4px;
  }

  .slider-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .slider-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  /* 결과 리스트 */
  .results-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .results-count {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .results-count strong { color: var(--accent); font-weight: 600; }

  .results-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .results-list::-webkit-scrollbar { width: 6px; }
  .results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .result-item {
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .result-item:hover {
    border-color: var(--accent);
    background: #1f1f1f;
  }
  .result-item.active {
    border-color: var(--accent);
    background: rgba(251, 191, 36, 0.08);
  }

  .result-row1 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .result-capacity {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }
  .result-kind {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--blue);
    color: white;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .result-kind.bdk005 { background: var(--green); }
  .result-kind.installed { background: var(--red); }

  .result-area {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .result-sido {
    font-size: 11px;
    color: var(--text);
    margin-top: 2px;
  }

  /* 액션 버튼 */
  .actions {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  button.btn {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  button.btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  button.btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.btn.primary:hover {
    background: var(--accent-dim);
    color: #000;
  }

  /* Map area */
  .map-container {
    position: relative;
    height: 100vh;
  }

  #map { width: 100%; height: 100%; }

  /* 지도 컨트롤 패널 */
  .map-overlay {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(19, 19, 19, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .map-overlay-title {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 2px;
  }

  .layer-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    padding: 2px 0;
  }

  .layer-toggle input { display: none; }

  .layer-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid transparent;
  }

  .layer-toggle input:not(:checked) ~ .layer-text { color: var(--text-dim); }
  .layer-toggle input:not(:checked) ~ .layer-dot { opacity: 0.3; }

  /* 범례 */
  .legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(19, 19, 19, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-box {
    width: 14px; height: 14px;
    border-radius: 3px;
    opacity: 0.7;
    border: 1.5px solid;
  }

  /* 지도타입 토글 */
  .map-type-toggle {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 10;
    background: rgba(19, 19, 19, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
  }

  .map-type-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 8px 14px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    text-transform: uppercase;
  }
  .map-type-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* 팝업 */
  .maplibregl-popup-content {
    background: var(--panel) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    padding: 16px !important;
    min-width: 240px;
    font-family: 'IBM Plex Sans KR', sans-serif !important;
  }
  .maplibregl-popup-tip { display: none !important; }
  .maplibregl-popup-close-button {
    color: var(--text-dim) !important;
    font-size: 20px !important;
    padding: 4px 8px !important;
  }

  .popup-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--accent);
  }

  .popup-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .popup-row:last-of-type { border-bottom: none; }
  .popup-row strong {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .popup-actions {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }

  .popup-actions button {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
  }
  .popup-actions button:hover { border-color: var(--accent); }
  .popup-actions button.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .popup-memo {
    width: 100%;
    margin-top: 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    font-size: 11px;
    border-radius: 4px;
    font-family: inherit;
    resize: vertical;
    min-height: 40px;
  }

  /* 로딩 */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.92);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.hidden { display: none; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--panel);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 12px;
    z-index: 200;
    transform: translateY(120%);
    transition: transform 0.3s;
  }
  .toast.show { transform: translateY(0); }
</style>
</head>
<body>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="brand">
    <div class="brand-logo">☀</div>
    <div class="brand-text">
      <div class="brand-title">태양광 영업 타겟 분석</div>
      <div class="brand-subtitle">solar-sales-tool v1.0</div>
    </div>
  </div>

  <div class="panel-section">
    <div class="section-title">지역 필터</div>
    <div class="filter-grid">
      <div>
        <label class="field-label">시/도</label>
        <select id="sidoFilter">
          <option value="">전체</option>
        </select>
      </div>
      <div>
        <label class="field-label">건물 유형</label>
        <select id="kindFilter">
          <option value="">전체</option>
          <option value="BDK004">공장/창고</option>
          <option value="BDK005">무벽/축사</option>
        </select>
      </div>
    </div>
  </div>

  <div class="panel-section">
    <div class="section-title">설비용량 / 계수</div>

    <div class="slider-wrap">
      <div class="slider-row">
        <span class="field-label" style="margin:0">최소 설비용량</span>
        <span class="slider-value" id="capValue">300 kW</span>
      </div>
      <input type="range" id="capSlider" min="100" max="3000" value="300" step="50">
    </div>

    <div class="slider-wrap" style="margin-top:14px">
      <div class="slider-row">
        <span class="field-label" style="margin:0">지붕 활용률</span>
        <span class="slider-value" id="utilValue">50%</span>
      </div>
      <input type="range" id="utilSlider" min="20" max="100" value="50" step="5">
    </div>

    <div class="slider-wrap" style="margin-top:14px">
      <div class="slider-row">
        <span class="field-label" style="margin:0">㎡당 설비용량</span>
        <span class="slider-value" id="kwValue">0.10 kW</span>
      </div>
      <input type="range" id="kwSlider" min="5" max="20" value="10" step="1">
    </div>
  </div>

  <div class="results-header">
    <div class="section-title" style="margin:0">결과</div>
    <div class="results-count"><strong id="resultCount">0</strong> 건</div>
  </div>

  <div class="results-list" id="resultsList"></div>

  <div class="actions">
    <button class="btn" id="bookmarkBtn">★ 북마크 (<span id="bmCount">0</span>)</button>
    <button class="btn primary" id="exportBtn">엑셀</button>
  </div>
</div>

<!-- 지도 영역 -->
<div class="map-container">
  <div id="map"></div>

  <!-- 지도 타입 -->
  <div class="map-type-toggle">
    <button class="map-type-btn active" data-type="base">일반</button>
    <button class="map-type-btn" data-type="satellite">위성</button>
  </div>

  <!-- 레이어 컨트롤 -->
  <div class="map-overlay">
    <div class="map-overlay-title">레이어</div>
    <label class="layer-toggle">
      <input type="checkbox" id="layerBuildings" checked>
      <span class="layer-dot" style="background:#3b82f6;border-color:#3b82f6"></span>
      <span class="layer-text">건물 폴리곤</span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" id="layerSolar" checked>
      <span class="layer-dot" style="background:#ef4444;border-color:#ef4444"></span>
      <span class="layer-text">기설치 태양광</span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" id="layerParking">
      <span class="layer-dot" style="background:#10b981;border-color:#10b981"></span>
      <span class="layer-text">주차장</span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" id="layerPOI">
      <span class="layer-dot" style="background:#fbbf24;border-color:#fbbf24"></span>
      <span class="layer-text">상호명 (POI)</span>
    </label>
  </div>

  <!-- 범례 -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-box" style="background:#3b82f6;border-color:#3b82f6"></div>
      <span>영업가능 (건물)</span>
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:#ef4444;border-color:#ef4444"></div>
      <span>기설치 (건물)</span>
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:#10b981;border-color:#10b981"></div>
      <span>영업가능 (주차장)</span>
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:#f97316;border-color:#f97316"></div>
      <span>기설치 (주차장)</span>
    </div>
  </div>
</div>

<!-- 로딩 -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">건물 데이터 로드 중...</div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
